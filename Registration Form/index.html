<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Registration Form</title>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Poppins">
        <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Muli">
        <link rel="stylesheet" href="css/normalize.css">
        <link rel="stylesheet" href="css/styles.css">
    </head>
    <body>

        <header class="main-head">
            <h1>The Code Review</h1>
        </header>
        <div class="about">
            <h1>Signup for our newsletter</h1>
            <p>Get the lastest news on how your code is doing right in your inbox</p>
        </div>
       
        <div class="thin"></div>

        <form action="index.html" method="POST">
            <fieldset class="ct-info">
                <legend>Contact Information</legend>

                <div class="entry">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" placeholder="Required" required>
                </div>

                <div class="entry">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="Required" required>
                </div>

                <div class="entry">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" name="phone" placeholder="XXX-XXX-XXXX">
                </div>

                <div class="entry">
                    <label for="address">Street Address</label>
                    <input type="text" id="address" name="address" placeholder="123 Street Ave Apt#">
                </div>

                <div class="entry">
                    <label for="city">City</label>
                    <input type="text" id="city" name="city" placeholder="City">
                </div>
                
                <div class="entry">
                    <label for="state">State</label>
                    <select id="state" name="state">
                        <option disabled selected>Choose State</option>
                        <option value="alabama">Alabama</option>
                        <option value="alaska">Alaska</option>
                        <option value="arizona">Arizona</option>
                        <option value="arkansas">Arkansas</option>
                        <option value="california">California</option>
                        <option value="colorado">Colorado</option>
                        <option value="connecticut">Connecticut</option>
                        <option value="delaware">Delaware</option>
                        <option value="florida">Florida</option>
                        <option value="georgia">Georgia</option>
                        <option value="hawaii">Hawaii</option>
                        <option value="idaho">Idaho</option>
                        <option value="illinois">Illinois</option>
                        <option value="indiana">Indiana</option>
                        <option value="iowa">Iowa</option>
                        <option value="kansas">Kansas</option>
                        <option value="kentucky">Kentucky</option>
                        <option value="louisiana">Louisiana</option>
                        <option value="maine">Maine</option>
                        <option value="maryland">Maryland</option>
                        <option value="massachusetts">Massachusetts</option>
                        <option value="michigan">Michigan</option>
                        <option value="minnesota">Minnesota</option>
                        <option value="mississippi">Mississippi</option>
                        <option value="missouri">Missouri</option>
                        <option value="montana">Montana</option>
                        <option value="nebraska">Nebraska</option>
                        <option value="nevada">Nevada</option>
                        <option value="new-hampshire">New Hampshire</option>
                        <option value="new-jersey">New Jersey</option>
                        <option value="new-mexico">New Mexico</option>
                        <option value="new-york">New York</option>
                        <option value="north-carolina">North Carolina</option>
                        <option value="north-dakota">North Dakota</option>
                        <option value="ohio">Ohio</option>
                        <option value="oklahoma">Oklahoma</option>
                        <option value="oregon">Oregon</option>
                        <option value="pennsylvania">Pennsylvania</option>
                        <option value="rhode-island">Rhode Island</option>
                        <option value="south-carolina">South Carolina</option>
                        <option value="south-dakota">South Dakota</option>
                        <option value="tennessee">Tennessee</option>
                        <option value="texas">Texas</option>
                        <option value="utah">Utah</option>
                        <option value="vermont">Vermont</option>
                        <option value="virginia">Virginia</option>
                        <option value="washington">Washington</option>
                        <option value="west-virginia">West Virginia</option>
                        <option value="wisconsin">Wisconsin</option>
                        <option value="wyoming">Wyoming</option>
                    </select>
                </div>

                <div class="entry">
                    <label for="zip">Zip Code</label>
                    <input type="text" id="zip" name="zip" placeholder="Required" required>
                </div>

            </fieldset>

            <div class="thin"></div>

            <fieldset class="subscribe">
                <legend>Newsletter</legend>

                    <label>Select the newsletter you would like to receive</label>
                
                    <div class="options">
                        <input type="checkbox" id="html" name="news-op" value="html">
                        <label for="html">HTML News</label>
                    </div>

                    <div class="options">
                        <input type="checkbox" id="css" name="news-op" value="css">
                        <label for="css">CSS News</label>
                    </div>

                    <div class="options">
                        <input type="checkbox" id="javascript" name="news-op" value="javascript">
                        <label for="javascript">Javascript News</label>
                    </div>

                <br>
                <label>Newsletter Format</label>

                <div class="options">
                    <input type="radio" id="h-format" name="text-op" value="h-format">
                    <label for="h-format">HTML</label>
                </div>

                <div class="options">
                    <input type="radio" id="t-format" name="text-op" value="t-format">
                    <label for="t-format">Plain Text</label>
                </div>

                <br>
                <label for="comments">Other topics you'd like to hear about</label>

                <textarea id="comments" name="comments" cols="40" rows="10"></textarea>

                <button type="submit" value="Submit">Sign Up</button>

            </fieldset>
        </form>
    </body>
    <footer>
        <p>Copyright The Code Review</p>
    </footer>
    <br><br><br>
</html>
